services:
  postgres:
    image: postgres:16
    container_name: headlinehub_postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: headlinehub_backend
    restart: always
    env_file:
      - .env
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: headlinehub_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "3008:3000"
    environment:
      PORT: 3000
    depends_on:
      - backend

volumes:
  postgres_data: